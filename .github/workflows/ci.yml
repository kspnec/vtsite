name: CI

on:
  push:
    branches:
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  backend-test:
    name: Backend · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Frontend ───────────────────────────────────────────────
  frontend-lint:
    name: Frontend · Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── E2E ────────────────────────────────────────────────────
  e2e:
    name: E2E · Playwright
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend
        working-directory: backend
        run: |
          pip install -r requirements.txt
          SEED_DEMO_DATA=true \
          FIRST_ADMIN_EMAIL=admin@village.com \
          FIRST_ADMIN_PASSWORD=admin123 \
          SECRET_KEY=ci-secret \
          ALGORITHM=HS256 \
          ACCESS_TOKEN_EXPIRE_MINUTES=10080 \
          DATABASE_URL=sqlite:///./ci_e2e.db \
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend…"
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Install frontend deps & build
        working-directory: frontend
        run: npm ci
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run build
          npm start &
          echo "Waiting for frontend…"
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break || sleep 2
          done
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          API_URL: http://localhost:8000

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
